limit_req_zone $binary_remote_addr zone=minio_drive_api:10m rate=20r/s;

upstream minio_drive_backend {
    server backend:4001;
}

server {
    listen 80;
    server_name _;

    location /api/ {
        limit_req zone=minio_drive_api burst=40 nodelay;

        proxy_pass http://minio_drive_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://frontend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
